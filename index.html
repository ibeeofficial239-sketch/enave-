<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Theme Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e8,#c8f7ff,#fff0b8);
overflow-x:hidden;
transition:0.5s;
}

/* LOGIN PAGE */

.container{
display:flex;
align-items:center;
justify-content:center;
gap:40px;
padding:20px;
flex-wrap:wrap;
}

.baby{
font-size:140px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

.login-card{
width:350px;
background:rgba(255,255,255,0.95);
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
backdrop-filter:blur(10px);
animation:fadeIn 1s ease;
}

.login-card h1{
text-align:center;
color:#ff5e9b;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

.input-group input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:15px;
background:#f5f5f5;
font-size:16px;
transition:0.3s;
}

.input-group input:focus{
box-shadow:0 0 10px #ffb6d9;
transform:scale(1.02);
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff69b4,#ff9a44);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
transform:translateY(-3px) scale(1.03);
box-shadow:0 8px 20px rgba(255,105,180,.4);
}

.login-btn:active{
transform:scale(.95);
}

.error{
text-align:center;
color:red;
margin-top:10px;
}

/* DASHBOARD */

.dashboard{
display:none;
width:100%;
min-height:100vh;
padding:20px;
text-align:center;
background-size:cover;
background-position:center;
animation:fadeIn 1s;
}

.welcome{
font-size:40px;
font-weight:bold;
color:white;
text-shadow:2px 2px 10px rgba(0,0,0,.3);
margin-bottom:20px;
}

.card{
max-width:700px;
margin:auto;
background:rgba(255,255,255,.9);
padding:25px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.upload-box{
margin:20px 0;
}

label{
display:block;
margin-bottom:10px;
font-weight:bold;
color:#ff5e9b;
}

input[type=file]{
padding:10px;
width:100%;
background:#f8f8f8;
border-radius:12px;
}

.profile{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:5px solid #ff69b4;
margin:15px auto;
display:block;
}

video{
width:100%;
margin-top:15px;
border-radius:20px;
}

.emoji-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.emoji{
position:absolute;
font-size:40px;
animation:float 3s linear forwards;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0.5);
opacity:1;
}
100%{
transform:translateY(-100px) scale(1.5);
opacity:0;
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:768px){

.baby{
font-size:100px;
}

.login-card{
width:100%;
max-width:350px;
}

.welcome{
font-size:28px;
}
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="container" id="loginPage">

<div class="baby">👶</div>

<div class="login-card">
<h1>Baby Login</h1>

<div class="input-group">
<input type="text" id="username" placeholder="Username">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
</div>

<button class="login-btn" onclick="login()">
Login
</button>

<p class="error" id="error"></p>
</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="emoji-container" id="emojiContainer"></div>

<h1 class="welcome">Welcome, Shafrina! 🎉</h1>

<div class="card">

<img
id="profilePreview"
class="profile"
src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png"
alt="Profile">

<div class="upload-box">
<label>Upload Profile Image</label>
<input type="file" id="profileUpload" accept="image/*">
</div>

<div class="upload-box">
<label>Set Background Image</label>
<input type="file" id="bgUpload" accept="image/*">
</div>

<div class="upload-box">
<label>Upload Custom Video</label>
<input type="file" id="videoUpload" accept="video/*">
<video id="videoPlayer" controls></video>
</div>

</div>
</div>

<script>

function login(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

if(username === "shafrina" &&
password === "arham"){

document.getElementById("loginPage").style.display="none";

document.getElementById("dashboard").style.display="block";

showEmojis();

}else{

document.getElementById("error").innerText =
"Invalid Username or Password!";
}
}

/* Emoji Celebration */

function showEmojis(){

const container =
document.getElementById("emojiContainer");

const emojis = ["😊","😍","🎉","✨","💖","🌈"];

for(let i=0;i<40;i++){

let emoji=document.createElement("div");
emoji.classList.add("emoji");

emoji.innerHTML=
emojis[Math.floor(Math.random()*emojis.length)];

emoji.style.left=Math.random()*100+"%";

emoji.style.animationDuration=
(2+Math.random()*3)+"s";

container.appendChild(emoji);

setTimeout(()=>{
emoji.remove();
},5000);
}
}

/* Profile Upload */

document
.getElementById("profileUpload")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

document
.getElementById("profilePreview")
.src=e.target.result;

}

reader.readAsDataURL(file);
}
});

/* Background Upload */

document
.getElementById("bgUpload")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

document
.getElementById("dashboard")
.style.backgroundImage=
`url(${e.target.result})`;

}

reader.readAsDataURL(file);
}
});

/* Video Upload */

document
.getElementById("videoUpload")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

const url=URL.createObjectURL(file);

document
.getElementById("videoPlayer")
.src=url;

}
});

</script>

</body>
</html>
