<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tiny Steps Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(90deg,#f6f3e8,#eefcff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:420px;
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo .baby{
font-size:70px;
animation:bounce 2s infinite;
}

.logo h1{
color:#d96cb5;
font-size:36px;
margin-top:10px;
}

.logo p{
color:#777;
font-size:16px;
}

.card{
background:white;
border-radius:30px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.card h2{
font-size:34px;
color:#5b4a8d;
margin-bottom:10px;
}

.subtitle{
color:#777;
margin-bottom:25px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#555;
}

input{
width:100%;
padding:15px;
border:2px solid #ffd1df;
border-radius:15px;
outline:none;
font-size:16px;
margin-bottom:20px;
transition:.3s;
}

input:focus{
border-color:#ff82a8;
box-shadow:0 0 10px rgba(255,130,168,.3);
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:#ff7ca5;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

button:active{
transform:scale(.95);
}

.error{
text-align:center;
color:red;
margin-top:10px;
}

.dashboard{
display:none;
text-align:center;
padding:20px;
}

.welcome{
font-size:32px;
color:#5b4a8d;
margin-bottom:15px;
}

.emoji{
font-size:70px;
animation:bounce 1s infinite;
}

.upload{
margin-top:25px;
background:white;
padding:20px;
border-radius:20px;
}

.profile{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
margin-bottom:15px;
border:4px solid pink;
}

video{
width:100%;
margin-top:15px;
border-radius:15px;
}

@keyframes bounce{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
}

@media(max-width:480px){

.logo h1{
font-size:28px;
}

.card{
padding:22px;
}

.card h2{
font-size:28px;
}
}

</style>
</head>

<body>

<div class="container">

<div id="loginPage">

<div class="logo">
<div class="baby">👶</div>
<h1>Tiny Steps</h1>
<p>A cozy little corner, just for you 🌙</p>
</div>

<div class="card">

<h2>Welcome Back!</h2>
<p class="subtitle">Sign in to continue</p>

<label>Username</label>
<input type="text" id="username">

<label>Password</label>
<input type="password" id="password">

<button onclick="login()">Log In</button>

<div class="error" id="error"></div>

</div>

</div>

<div class="dashboard" id="dashboard">

<div class="emoji">😊🎉😍</div>

<h1 class="welcome">
Welcome, Shafrina!
</h1>

<div class="upload">

<img
id="profile"
class="profile"
src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

<p><b>Upload Profile Image</b></p>
<input type="file" id="profileUpload" accept="image/*">

<br><br>

<p><b>Set Background</b></p>
<input type="file" id="bgUpload" accept="image/*">

<br><br>

<p><b>Upload Video</b></p>
<input type="file" id="videoUpload" accept="video/*">

<video id="videoPlayer" controls></video>

</div>

</div>

</div>

<script>

function login(){

let user =
document.getElementById("username").value.trim();

let pass =
document.getElementById("password").value.trim();

if(user==="shafrina" && pass==="arham"){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

}else{

document.getElementById("error").innerHTML =
"Wrong username or password!";
}
}

profileUpload.onchange = function(){

const file = this.files[0];

if(file){

document.getElementById("profile").src =
URL.createObjectURL(file);

}
};

bgUpload.onchange = function(){

const file = this.files[0];

if(file){

document.body.style.backgroundImage =
`url(${URL.createObjectURL(file)})`;

document.body.style.backgroundSize="cover";
document.body.style.backgroundPosition="center";
}
};

videoUpload.onchange = function(){

const file = this.files[0];

if(file){

videoPlayer.src =
URL.createObjectURL(file);

}
};

</script>

</body>
</html>
